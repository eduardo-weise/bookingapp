<article
    class="card"
    [class.card--unpadded]="!padded()"
>
    @if (title() || subtitle()) {
    <header class="card__header">
        @if (title()) {
        <h3 class="card__title">{{ title() }}</h3>
        }

        @if (subtitle()) {
        <p class="card__subtitle">{{ subtitle() }}</p>
        }
    </header>
    }

    <div class="card__content">
        <ng-content></ng-content>
    </div>
</article>
