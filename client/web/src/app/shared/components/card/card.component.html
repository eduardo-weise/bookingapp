<article
    class="card"
    [class.card--solid]="variant() === 'solid'"
>
    @if (title() || subtitle()) {
    <header class="card__header">
        @if (title()) {
        <h3 class="card__title">{{ title() }}</h3>
        }

        @if (subtitle()) {
        <p class="card__subtitle">{{ subtitle() }}</p>
        }
    </header>
    }

    <ng-content></ng-content>
</article>
