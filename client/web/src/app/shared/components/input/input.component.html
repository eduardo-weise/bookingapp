<label
    class="field"
    [attr.for]="resolvedInputId"
>
    @if (label()) {
    <span class="field__label">{{ label() }}</span>
    }

    <input
        class="field__input"
        [id]="resolvedInputId"
        [attr.type]="type()"
        [attr.placeholder]="placeholder()"
        [value]="value"
        [disabled]="disabled() || isDisabled"
        [readOnly]="readonly()"
        [required]="required()"
        (input)="handleInput($event)"
        (blur)="handleBlur()"
    />

    @if (hint()) {
    <span class="field__hint">{{ hint() }}</span>
    }
</label>
